name: Scrape Every 15 Minutes

concurrency:
  group: scrape-runner
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  # schedule:
  #   - cron: "*/15 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REPO_URL: https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ vars.GH_REPO }}.git
  REPO_DIR: ./ghrepo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Clone Git Repo
        run: |
          git clone "$REPO_URL" "$REPO_DIR"
          cd "$REPO_DIR"
          git checkout dist

      - name: Install dependencies
        working-directory: ${{ env.REPO_DIR }}
        run: npm install

      - name: Run scraper
        working-directory: ${{ env.REPO_DIR }}
        run: npm start

      - name: Commit & Push to dist
        working-directory: ${{ env.REPO_DIR }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          mkdir -p output debug
          touch output/.keep debug/.keep

          git add -A -f output/* debug/* 2>/dev/null || true
          git commit -m "Updated at $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || echo "No changes"
          git push "$REPO_URL" dist --force

      - name: Install dependencies
        run: npm install @octokit/rest

      - name: Run cleanup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL: ${{ github.repository }}
          KEEP_LOGS_FOR_DAYS: -1
        run: |
          node .github/scripts/cleanup.js

      - name: Wait 15 minutes
        run: sleep 900

      - name: Trigger next run
        if: success() && github.run_attempt == 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/scraper.yml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
